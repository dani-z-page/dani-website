<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;1,500&display=swap" rel="stylesheet">
<style>
@keyframes cg-draw { to { stroke-dashoffset: 0; } }
@keyframes cg-pop { 0% { opacity: 0; transform: scale(0.2); } 60% { opacity: 1; transform: scale(1.25); } 100% { opacity: 1; transform: scale(1); } }
@keyframes cg-fade { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
</style>
</helmet>
<div style="position:relative; width:100%;">
  <svg key="{{ playKey }}" viewBox="-90 0 1270 360" preserveAspectRatio="xMidYMid meet" style="width:100%; height:auto; display:block; overflow:visible;">
    <sc-for list="{{ faintPaths }}" as="d" hint-placeholder-count="2">
      <path d="{{ d }}" fill="none" stroke="{{ faintColor }}" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="stroke-dasharray:9000; stroke-dashoffset:9000; animation: cg-draw 3s cubic-bezier(.2,.7,.25,1) .1s forwards;"></path>
    </sc-for>
    <path d="{{ mainPath }}" fill="none" stroke="{{ inkColor }}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="stroke-dasharray:9000; stroke-dashoffset:9000; animation: cg-draw 3.1s cubic-bezier(.2,.7,.25,1) .15s forwards;"></path>
    <path d="{{ resolvedPath }}" fill="none" stroke="{{ accentColor }}" stroke-width="2.2" stroke-linecap="round" style="stroke-dasharray:520; stroke-dashoffset:520; animation: cg-draw .85s cubic-bezier(.4,0,.2,1) 2.45s forwards;"></path>
    <circle cx="862" cy="180" r="5" fill="{{ accentColor }}" style="transform-box:fill-box; transform-origin:center; opacity:0; animation: cg-pop .5s cubic-bezier(.34,1.4,.5,1) 3.15s forwards;"></circle>
    <circle cx="862" cy="180" r="5" fill="none" stroke="{{ accentColor }}" stroke-width="1.5" style="transform-box:fill-box; transform-origin:center; opacity:0; animation: cg-pop 1.6s ease-out 3.2s forwards;"></circle>
  </svg>
  <div style="position:absolute; left:75.5%; top:50%; transform:translateY(-50%); animation: cg-fade .7s ease-out 3.35s both;">
    <div style="font-family:'JetBrains Mono',monospace; font-style:italic; font-weight:500; font-size:15px; letter-spacing:-0.01em; color:{{ inkColor }}; white-space:nowrap; line-height:1.2;">{{ label }}</div>
    <div style="font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:0.04em; color:{{ subColor }}; white-space:nowrap; margin-top:5px; max-width:200px; white-space:normal;">{{ sublabel }}</div>
  </div>
  <button onClick="{{ replay }}" style="position:absolute; right:0; bottom:-6px; background:none; border:none; padding:4px 6px; cursor:pointer; font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:0.06em; text-transform:uppercase; color:{{ subColor }}; opacity:0.7;" style-hover="opacity:1;">↻ Replay</button>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:360},&quot;inkColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#f4f2ee&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;faintColor&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;oklch(0.74 0.11 190)&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;subColor&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;string&quot;},&quot;label&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;One source of truth&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;sublabel&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;who your customers are · what they need · how to deliver value&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;connective&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;converge&quot;,&quot;options&quot;:[&quot;converge&quot;,&quot;single&quot;],&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { playKey: 0 };

  gen() {
    const W = 520, midY = 180, N = 1100;
    const specs = [
      { A: 118, f1: 71, f2: 129, f3: 97, f4: 151, ph: 0.0, chaosEnd: 0.5, yoff: 0 },
      { A: 96,  f1: 83, f2: 112, f3: 132, f4: 167, ph: 1.9, chaosEnd: 0.46, yoff: -7 },
      { A: 104, f1: 64, f2: 143, f3: 88,  f4: 175, ph: 3.4, chaosEnd: 0.52, yoff: 9 },
    ];
    const paths = specs.map((s) => {
      let d = '';
      for (let i = 0; i <= N; i++) {
        const t = i / N;
        const env = Math.pow(Math.max(0, (s.chaosEnd - t) / s.chaosEnd), 1.4);
        const x = t * W + env * s.A * (Math.sin(t * s.f1 + s.ph) * 0.6 + Math.sin(t * s.f2 + s.ph * 1.7) * 0.45);
        const y = midY + s.yoff * env + env * s.A * (Math.cos(t * s.f3 + s.ph * 0.5) * 0.75 + Math.sin(t * s.f4 + s.ph) * 0.5);
        d += (i === 0 ? 'M' : 'L') + x.toFixed(1) + ' ' + y.toFixed(1) + ' ';
      }
      return d.trim();
    });
    return paths;
  }

  renderVals() {
    const paths = this._paths || (this._paths = this.gen());
    const multi = (this.props.connective ?? 'converge') !== 'single';
    return {
      playKey: this.state.playKey,
      mainPath: paths[0],
      faintPaths: multi ? [paths[1], paths[2]] : [],
      resolvedPath: 'M520 180 L858 180',
      inkColor: this.props.inkColor ?? '#f4f2ee',
      faintColor: this.props.faintColor ?? 'rgba(244,242,238,0.32)',
      accentColor: this.props.accentColor ?? 'oklch(0.74 0.11 190)',
      subColor: this.props.subColor ?? 'rgba(244,242,238,0.5)',
      label: this.props.label ?? 'One source of truth',
      sublabel: this.props.sublabel ?? 'who your customers are · what they need · how to deliver value',
      replay: () => this.setState((s) => ({ playKey: s.playKey + 1 })),
    };
  }
}
</script>
</body>
</html>
